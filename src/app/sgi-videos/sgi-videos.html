<div class="min-h-screen bg-gray-100">

<back-to-home></back-to-home>

<!-- TITULO -->
<div class="text-center mt-10 mb-10">

<h1 class="text-3xl font-bold tracking-wide text-gray-800">
Capacitaciones PharmaLink
</h1>

<p class="text-gray-500 mt-2">
Aprende a utilizar las herramientas del sistema
</p>

<div class="w-24 h-1 bg-blue-600 mx-auto mt-4 rounded-full"></div>

</div>


<!-- GRID -->
<div class="max-w-7xl mx-auto px-6">

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

@for (video of videos; track $index) {

<div
class="group relative overflow-hidden rounded-2xl shadow-md hover:shadow-2xl transition-all duration-500">

<!-- VIDEO -->
<iframe
class="w-full h-72 transition-transform duration-500 group-hover:scale-105"
[src]="getVideoUrl(video.url)"
[title]="video.name"
allowfullscreen>
</iframe>

<!-- OVERLAY (NO bloquea el iframe) -->
<div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/30 to-transparent pointer-events-none"></div>

<!-- TITULO -->
<div class="absolute bottom-6 left-6 pointer-events-none">

<h3 class="text-white text-xl font-semibold tracking-wide">
{{video.name}}
</h3>

</div>

</div>

}

</div>

</div>

</div>
